# GymCN 后端 CI/CD 配置
# GitHub Actions 自动部署到 CloudBase

name: Deploy Backend to CloudBase

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      # 3. 构建项目
      - name: Build with Maven
        working-directory: ./backend
        run: |
          mvn clean package -DskipTests
          echo "=== Maven 打包完成，target 目录内容 ==="
          ls -la target/
          echo "=== 查找 jar 文件 ==="
          find target/ -name "*.jar" -type f
      
      # 4. 安装 CloudBase CLI
      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest
      
      # 5. 登录 CloudBase
      - name: Login to CloudBase
        run: tcb login --apiKeyId ${{ secrets.CLOUDBASE_SECRET_ID }} --apiKey ${{ secrets.CLOUDBASE_SECRET_KEY }}
      
      # 6. 检查数据库是否已初始化（通过检查 gymcn schema 的 venues 表）
      - name: Check if database is initialized
        id: check_db
        run: |
          SCHEMA_NAME="${{ secrets.POSTGRES_SCHEMA }}"
          RESULT=$(tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "SELECT EXISTS (SELECT FROM ${SCHEMA_NAME}.venues WHERE TRUE);" --json 2>/dev/null || echo '{"exists": false}')
          echo "Check result: $RESULT"
          if echo "$RESULT" | grep -q '"exists":true'; then
            echo "db_initialized=true" >> $GITHUB_OUTPUT
          else
            echo "db_initialized=false" >> $GITHUB_OUTPUT
          fi
      
      # 7. 仅在数据库未初始化时执行 SQL 初始化
      - name: Initialize database
        if: steps.check_db.outputs.db_initialized == 'false'
        run: |
          SCHEMA_NAME="${{ secrets.POSTGRES_SCHEMA }}"
          echo "开始初始化 schema: ${SCHEMA_NAME}..."
          
          # 先创建 gymcn schema
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "CREATE SCHEMA IF NOT EXISTS ${SCHEMA_NAME};" --json
          
          # 在 gymcn schema 中创建 users 表
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "
          CREATE TABLE IF NOT EXISTS ${SCHEMA_NAME}.users (
              id BIGSERIAL PRIMARY KEY,
              phone VARCHAR(20) NOT NULL UNIQUE,
              nickname VARCHAR(50) DEFAULT NULL,
              avatar VARCHAR(500) DEFAULT NULL,
              user_type VARCHAR(20) DEFAULT 'personal',
              enterprise_id BIGINT DEFAULT NULL,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              deleted SMALLINT DEFAULT 0
          );" --json
          
          # 在 gymcn schema 中创建 venues 表
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "
          CREATE TABLE IF NOT EXISTS ${SCHEMA_NAME}.venues (
              id BIGSERIAL PRIMARY KEY,
              name VARCHAR(100) NOT NULL,
              address VARCHAR(255) NOT NULL,
              city VARCHAR(50) DEFAULT '广州',
              district VARCHAR(50) DEFAULT NULL,
              longitude DECIMAL(10, 6) DEFAULT NULL,
              latitude DECIMAL(10, 6) DEFAULT NULL,
              type VARCHAR(20) DEFAULT 'gym',
              cover_image VARCHAR(500) DEFAULT NULL,
              phone VARCHAR(20) DEFAULT NULL,
              business_hours VARCHAR(100) DEFAULT NULL,
              status VARCHAR(20) DEFAULT 'active',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              deleted SMALLINT DEFAULT 0
          );" --json
          
          # 在 gymcn schema 中创建 enterprises 表
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "
          CREATE TABLE IF NOT EXISTS ${SCHEMA_NAME}.enterprises (
              id BIGSERIAL PRIMARY KEY,
              name VARCHAR(100) NOT NULL,
              contact_person VARCHAR(50) DEFAULT NULL,
              contact_phone VARCHAR(20) DEFAULT NULL,
              address VARCHAR(255) DEFAULT NULL,
              employee_count INT DEFAULT 0,
              status VARCHAR(20) DEFAULT 'active',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              deleted SMALLINT DEFAULT 0
          );" --json
          
          # 在 gymcn schema 中创建 membership_cards 表
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "
          CREATE TABLE IF NOT EXISTS ${SCHEMA_NAME}.membership_cards (
              id BIGSERIAL PRIMARY KEY,
              user_id BIGINT NOT NULL,
              enterprise_id BIGINT DEFAULT NULL,
              card_type VARCHAR(20) NOT NULL,
              start_date DATE NOT NULL,
              end_date DATE NOT NULL,
              status VARCHAR(20) DEFAULT 'active',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              deleted SMALLINT DEFAULT 0
          );" --json
          
          # 在 gymcn schema 中创建 checkin_records 表
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "
          CREATE TABLE IF NOT EXISTS ${SCHEMA_NAME}.checkin_records (
              id BIGSERIAL PRIMARY KEY,
              user_id BIGINT NOT NULL,
              venue_id BIGINT NOT NULL,
              checkin_time TIMESTAMP NOT NULL,
              checkout_time TIMESTAMP DEFAULT NULL,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );" --json
          
          echo "表创建完成，插入示例数据..."
          
          # 插入示例场馆到 gymcn schema
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "
          INSERT INTO ${SCHEMA_NAME}.venues (name, address, city, district, type, business_hours, status) VALUES
          ('威尔士健身（天河城店）', '天河区天河路208号天河城6楼', '广州', '天河区', 'gym', '06:00-23:00', 'active'),
          ('超级猩猩健身（珠江新城店）', '天河区珠江新城花城大道88号', '广州', '天河区', 'gym', '07:00-22:00', 'active'),
          ('一梵瑜伽工作室', '海珠区昌岗路江南坊2楼', '广州', '海珠区', 'yoga', '09:00-21:00', 'active'),
          ('力健游泳馆', '番禺区大学城外环西路28号', '广州', '番禺区', 'swimming', '06:00-21:00', 'active'),
          ('舒适堡健身（正佳广场店）', '天河区天河路228号正佳广场5楼', '广州', '天河区', 'gym', '10:00-22:00', 'active')
          ON CONFLICT DO NOTHING;" --json
          
          echo "数据库初始化完成！"
      
      # 8. 验证数据库初始化
      - name: Verify database initialization
        if: steps.check_db.outputs.db_initialized == 'false'
        run: |
          SCHEMA_NAME="${{ secrets.POSTGRES_SCHEMA }}"
          echo "验证场馆数据..."
          tcb db execute -e ${{ secrets.CLOUDBASE_ENV_ID }} --sql "SELECT id, name, city, type FROM ${SCHEMA_NAME}.venues;" --json
      
      # 9. 部署云函数
      - name: Deploy Cloud Function
        run: |
          # 1. 准备函数目录
          mkdir -p functions/gymcn-backend
          cp backend/target/gymcn-backend.jar functions/gymcn-backend/
          
          # 2. 启动脚本（加 -Dserver.port=9000）
          cat > functions/gymcn-backend/scf_bootstrap << 'EOF'
          #!/bin/bash
          /var/lang/java8/bin/java -Dserver.port=9000 -jar gymcn-backend.jar
          EOF
          chmod +x functions/gymcn-backend/scf_bootstrap
          
          # 3. ⬇️ 关键：打成 ZIP，注意是打包目录内的文件，不包含目录本身
          cd functions/gymcn-backend
          zip -r ../gymcn-backend.zip ./*
          cd ../..
          
          # 4. 部署
          tcb fn deploy gymcn-backend \
              --env-id ${{ secrets.CLOUDBASE_ENV_ID }} \
              --force \
              --yes
      
      # 10. 输出部署结果
      - name: Show deployment result
        run: |
          echo "云函数部署完成！"
          tcb fn list --envId ${{ secrets.CLOUDBASE_ENV_ID }}
